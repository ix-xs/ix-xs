<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="220" rx="6" fill="#141414" stroke="rgba(255,255,255,0.08)" />
  <rect x="38" y="20" height="24" rx="3" fill="rgba(0,0,0,0.30)" />
  <text x="48" y="36" fill="#6F7276" font-family="'JetBrains Mono', monospace" font-size="11">about.md</text>
  
  <text x="42" y="82" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="14">J'ai commencé par bidouiller des bots Discord. Très vite, il a fallu</text>
  <text x="42" y="102" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="14">un dashboard, donc une API, donc un front, donc une base de données,</text>
  <text x="42" y="122" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="14">donc un VPS, donc des mails qui arrivent vraiment.</text>
  <text x="42" y="152" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="14">Aujourd'hui je bosse en freelance, en solo ou avec des designers</text>
  <text x="42" y="172" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="14">et agences. Je fais le dev, parfois le branding, souvent l'infra</text>
  <text x="42" y="192" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="14">qui va avec.</text>

</svg>
