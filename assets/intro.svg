  <!-- hero -->
  <text x="42" y="106" fill="#6F7276" font-family="'JetBrains Mono', monospace" font-size="12">ix_xs • dev javascript freelance</text>
  <text x="42" y="130" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="13">Salut, moi c'est Ix-xs. Je code en JavaScript depuis bientôt 5 ans,</text>
  <text x="42" y="150" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="13">en autodidacte. Je fais des bots Discord, des APIs avec Fastify,</text>
  <text x="42" y="170" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="13">des dashboards temps réel et quelques apps desktop.</text>
  <text x="42" y="194" fill="#6F7276" font-family="'JetBrains Mono', monospace" font-size="13">Je touche aussi au branding, à la config VPS, DNS, DKIM/DMARC,</text>
  <text x="42" y="214" fill="#6F7276" font-family="'JetBrains Mono', monospace" font-size="13">et au mailing. Bref, j'aime construire des trucs de bout en bout.</text>
