  <text x="26" y="82" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="17">• bots discord complets avec dashboard web</text>
  <text x="26" y="114" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="17">• apis fastify et dashboards admin sur mesure</text>
  <text x="26" y="146" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="17">• oauth2 discord / google / github</text>
  <text x="26" y="178" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="17">• mails transactionnels et délivrabilité</text>
  <text x="26" y="210" fill="#F0F0EB" font-family="'JetBrains Mono', monospace" font-size="17">• vps, dns, dkim, dmarc, spf</text>
